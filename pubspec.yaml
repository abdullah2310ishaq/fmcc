name: doctor_app
description: Production-ready Flutter scaffold generated by the wizard.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:

  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^17.1.0

  # Networking
  dio: ^5.9.2

  # Auth
  google_sign_in: ^6.3.0

  # State Management
  equatable: ^2.0.7
  provider: ^6.1.5+1

  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0

  # Images & SVG
  cached_network_image: ^3.4.1

  # Logging
  logger: ^2.6.2
  flutter_svg: ^2.2.4
  flutter_screenutil: ^5.9.3

flutter_native_splash:
  color: "#FFFFFF"
  android: true
  ios: true
  web: false

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/logo.png
  remove_alpha_ios: true

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

dependency_overrides:

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/delete.png

    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/Inter.ttf
    - family: Cause
      fonts:
        - asset: assets/Cause-Variable.ttf
    - family: NotoNastaliqUrdu
      fonts:
        - asset: assets/NotoNastaliqUrdu.ttf

